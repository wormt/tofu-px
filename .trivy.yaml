---
config: '.trivy.yaml'
# debug: true
# ignorefile: '.trivyignore'
misconfiguration:
  scanners:
    - 'terraform'
    - 'terraformplan-json'
    - 'terraformplan-snapshot'
  terraform:
    exclude-downloaded-modules: false
exit-code: 1
format: 'github'
report: 'all'
scan:
  disable-telemetry: true
severity:
  - 'UNKNOWN'
  - 'LOW'
  - 'MEDIUM'
  - 'HIGH'
  - 'CRITICAL'
