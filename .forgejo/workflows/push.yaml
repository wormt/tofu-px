---
on:
  push: {}
  workflow_dispatch:
    inputs:
      apply:
        description: 'Run `tofu apply`?'
        required: true
        default: false
        type: 'bool'
      apply_wait:
        description: 'Wait x seconds before running `tofu apply`:'
        required: true
        default: 60
        type: 'number'
jobs:
  plan:
    name: 'tofu plan'
    runs-on: 'docker'
    steps:
      - uses: 'actions/checkout@v6'
      - uses: 'https://github.com/opentofu/setup-opentofu@v1'
      - name: 'Validate our environment.'
        run: |
          set -e
          tofu fmt -check
          tofu init -reconfigure
          tofu plan -out="${{ env.FORGEJO_WORKSPACE }}/terraform.plan"
      - name: 'Apply our changes to our environment.'
        if: '${{ inputs.apply }}'
        run: |
          sleep "${{ inputs.apply_wait }}"
          tofu apply -auto-approve "${{ env.FORGEJO_WORKSPACE }}/terraform.plan"

    container:
      # image: 'docker.io/node:lts'
      image: 'cgr.dev/chainguard/node:latest'
      env:
        TF_VAR_env: |-
          {
            "environment_name": "prod",
            "s3_endpoint": "https://s3.us-west-2.idrivee2.com/",
            "s3_bucket": "tfstate",
            "skip_validation": true,
            "pve_endpoint": "https://[fd67::200]:8006/"
          }
        TF_VAR_auth: |-
          {
            "users": [
              "root@pam",
              "root@pam"
            ],
            "passwords": [
              "${{ secrets.AUTH_PASS0 }}",
              "${{ secrets.AUTH_PASS1 }}"
            ]
          }
        AWS_REGION: 'us-west-2'
        AWS_ACCESS_KEY_ID: 'O1sh3RhWxWbn5bgOmflT'
        AWS_SECRET_ACCESS_KEY: '${{ secrets.AWS_SECRET_ACCESS_KEY }}'
