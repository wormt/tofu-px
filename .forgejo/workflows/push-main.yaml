---
on:
  push:
    branch: 'main'
  workflow_dispatch: {}
jobs:
  tofu:
    name: 'tofu'
    runs-on: 'docker'
    steps:
      - uses: 'actions/checkout@v4'
      - uses: 'https://github.com/opentofu/setup-opentofu@v1'
      - run: |
          set -e
          tofu fmt -check
          tofu init -reconfigure
          tofu plan -detailed-exitcode; status=$?
          echo "exit code: $status"
          if [ "$status" -eq 2 ]; then
            tofu apply -auto-approve
          fi
    container:
      image: 'code.forgejo.org/oci/node:lts'
      env:
        TF_VAR_env: |-
          {
            "environment_name": "prod",
            "s3_endpoint": "https://s3.us-west-2.idrivee2.com/",
            "s3_bucket": "tfstate",
            "skip_validation": true,
            "pve_endpoint": "https://[fd67::200]:8006/"
          }
        TF_VAR_auth: |-
          {
            "users": [
              "root@pam",
              "root@pam"
            ],
            "passwords": [
              "${{ secrets.AUTH_PASS0 }}",
              "${{ secrets.AUTH_PASS1 }}"
            ]
          }
        AWS_REGION: 'us-west-2'
        AWS_ACCESS_KEY_ID: 'O1sh3RhWxWbn5bgOmflT'
        AWS_SECRET_ACCESS_KEY: '${{ secrets.AWS_SECRET_ACCESS_KEY }}'
